name: 🔍 Detect Secrets & License Violations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Scan for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          fail: true

      - name: Check License Headers
        uses: apache/skywalking-eyes@main
        with:
          config: .github/license-config.yml
